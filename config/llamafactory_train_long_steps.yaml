### model
model_name_or_path: ../models/Qwen2.5-1.5B-Instruct
trust_remote_code: true

### method
stage: sft
do_train: true
finetuning_type: lora
lora_rank: 16
lora_alpha: 32
lora_dropout: 0.05
lora_target: q_proj,k_proj,v_proj,o_proj

### dataset
dataset_dir: data/training
dataset: mental_health_qa
template: qwen
cutoff_len: 1024
overwrite_cache: true
preprocessing_num_workers: 8
dataloader_num_workers: 2

### output
# Keep the original short-step adapter in output/lora_adapter untouched.
output_dir: output/lora_adapter_long_steps
logging_steps: 5
save_steps: 200
plot_loss: true
overwrite_output_dir: false
save_only_model: false
report_to: none

### train
per_device_train_batch_size: 4
gradient_accumulation_steps: 4
learning_rate: 2.0e-4
max_steps: 1200
lr_scheduler_type: cosine
warmup_ratio: 0.1
bf16: false
fp16: true
ddp_timeout: 180000000
resume_from_checkpoint: null

### eval
val_size: 0.1
per_device_eval_batch_size: 4
eval_strategy: steps
eval_steps: 200
